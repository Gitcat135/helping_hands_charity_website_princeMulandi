                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">

                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item">

                    </div>

        <!-- end of navbar -->

        <!-- Start of Hero section -->
        <section class="hero-sign_up">
            <div class="text-center pb-5" style="background-color: rgb(241, 240, 240);">
                <h1 class="display-1 mt-4" style="color: rgb(75, 85, 151);">Sign up</h1>
                <h5>Join us.</h5>
            </div>
        </section>
        <!-- End of Hero section -->

        <!-- Start of Sigh up section -->   
        <section class="sign_up">
            <div class="row  mx-auto mt-3" style="align-items: center; justify-content: center;">
                <div class="col-md-6">
                    <div class="shadow p-3 bg-white rounded">
                        <h3>Sign up</h5>
                        <div><p>Name:</p> <input type="text" class="form-control mb-3"></div>
                        <div><p>Email:</p><input type="text" class="form-control mb-3"></div>
                        
                        <div class="shadow p-3 bg-white rounded mt-3">
                            <h5>Payments</h5>
                            <div><p>Card number</p><input type="text" class="form-control mb-3" placeholder="e.g '1234 4654 5434 3345'"></div>
                            <div><p>Expiration Date</p><input type="text" class="form-control mb-3" placeholder="YY/MM"></div>
                            <div><p>Security Code</p><input type="text" class="form-control mb-3" placeholder="CVC"></div>
                            <div>
                            <div class="dropdown-container">
                                <label for="car-insurance">Choose Your Insurance Type:</label>
                                <select id="car-insurance" name="car-insurance">
                                    <option value="" disabled selected>Select an option</option>
                                    <option value="">Full Coverage $2200</option>
                                    <option value="">Minimal Coverage $600</option>
                                </select>
                                </div>
                            </div>
                            
                        <button  class="button-23" role="button"><a style="text-decoration: none ; color: black;" href="#">Submit</a></button>


                        </div>
                    </div>
                    
                        
                    
                </div>
            </div>
        </section>
        <!-- End of Sign up section -->

        <!-- Start of footer section -->
            <footer class="mt-5">
                <div class="row container-fluid ms-0" style="background-color: rgb(54, 48, 48);">

                    <h3>CarProtect</h3>
                    <p>Providing premium car insurance Since 2004.</p>
                </div>

                <div class="col-md-2 mt-4">
                    <h3 style="color: white;">Contact Info</h3>
                    <div style="display: flex;"><img style="width: 30px; height: 30px;" src="images/location.png" alt=""><p style="color: white;">Westlands, Nairobi</p></div>
                    <div style="display: flex;"><img style="width: 30px; height: 30px;" src="images/phone.png" alt=""><p style="color: white;">+322 863 123 223</p></div>
                    <div style="display: flex;"><img style="width: 30px; height: 30px;" src="images/letter.png" alt=""><p style="color: white;">info@CarProtect.org</p></div>
                </div>
            </div>
            </footer>
            <!-- end of footer section -->
